<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>群宝箱</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: { 50:'#eff6ff',100:'#dbeafe',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8' } } } }
    }
  </script>
  <style>
    .tag-dot-0 { background: #dbeafe; color: #1d4ed8; }
    .tag-dot-1 { background: #fce7f3; color: #be185d; }
    .tag-dot-2 { background: #d1fae5; color: #065f46; }
    .tag-dot-3 { background: #fef3c7; color: #92400e; }
    .tag-dot-4 { background: #ede9fe; color: #6d28d9; }
    .lightbox-backdrop { backdrop-filter: blur(8px); }
    .batch-bar { transition: transform 0.25s ease, opacity 0.25s ease; }
    .fade-in { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .msg-body-collapse { max-height: 120px; overflow: hidden; position: relative; }
    .msg-body-collapse::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 40px; background: linear-gradient(transparent, #fff); pointer-events: none; }
    .masonry { columns: 3; column-gap: 0.5rem; }
    .masonry > * { break-inside: avoid; margin-bottom: 0.5rem; }
    @media (min-width: 640px) { .masonry { columns: 4; column-gap: 1rem; } .masonry > * { margin-bottom: 1rem; } }
    @media (min-width: 768px) { .masonry { columns: 5; } }
    @media (min-width: 1024px) { .masonry { columns: 6; } }
    .masonry-msg { columns: 2; column-gap: 0.75rem; }
    .masonry-msg > * { break-inside: avoid; margin-bottom: 0.75rem; }
    @media (min-width: 768px) { .masonry-msg { columns: 3; column-gap: 1rem; } .masonry-msg > * { margin-bottom: 1rem; } }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-3 sm:px-6 h-12 sm:h-14 flex items-center justify-between gap-2">
      <a href="/" onclick="localStorage.setItem('qv-view','gallery')" class="flex items-center gap-1.5 sm:gap-2 shrink-0 hover:opacity-80 transition-opacity">
        <img src="/favicon.svg" class="w-6 h-6 sm:w-7 sm:h-7" alt="">
        <h1 class="text-base sm:text-lg font-semibold text-gray-900">群宝箱</h1>
      </a>
      <nav class="flex items-center gap-0.5 sm:gap-1 bg-gray-100 rounded-lg p-0.5 sm:p-1 text-xs sm:text-sm">
        <button id="navGallery" onclick="switchView('gallery')" class="px-2.5 sm:px-4 py-1 sm:py-1.5 rounded-md font-medium transition-colors bg-white text-gray-900 shadow-sm">画廊</button>
        <button id="navMessages" onclick="switchView('messages')" class="px-2.5 sm:px-4 py-1 sm:py-1.5 rounded-md font-medium transition-colors text-gray-500 hover:text-gray-700">消息</button>
        <a href="/upload" class="px-2.5 sm:px-4 py-1 sm:py-1.5 rounded-md font-medium text-gray-500 hover:text-gray-700 transition-colors">上传</a>
        <a href="/dedup" class="px-2.5 sm:px-4 py-1 sm:py-1.5 rounded-md font-medium text-gray-500 hover:text-gray-700 transition-colors">去重</a>
        <button onclick="loadData()" class="ml-0.5 p-1 sm:p-1.5 rounded-md text-gray-400 hover:text-gray-600 hover:bg-gray-200 transition-colors" title="刷新">
          <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        </button>
      </nav>
    </div>
  </header>

  <!-- Toolbar -->
  <div class="bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-3 sm:px-6 py-2 sm:py-3 flex items-center gap-2 sm:gap-3 flex-wrap">
      <select id="dateFilter" onchange="loadData()" class="text-xs sm:text-sm border border-gray-300 rounded-lg px-2 sm:px-3 py-1 sm:py-1.5 bg-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none">
        <option value="">全部日期</option>
      </select>
      <select id="tagFilter" onchange="loadData()" class="text-xs sm:text-sm border border-gray-300 rounded-lg px-2 sm:px-3 py-1 sm:py-1.5 bg-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none">
        <option value="">全部标签</option>
      </select>
      <select id="typeFilter" onchange="loadData()" class="hidden text-xs sm:text-sm border border-gray-300 rounded-lg px-2 sm:px-3 py-1 sm:py-1.5 bg-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none">
        <option value="">全部类型</option>
        <option value="text">纯文字</option>
        <option value="image">图片</option>
        <option value="video">视频</option>
        <option value="file">文件</option>
      </select>
      <button id="btnBatchMode" onclick="toggleBatchMode()" class="hidden text-xs sm:text-sm px-2 sm:px-3 py-1 sm:py-1.5 rounded-lg border border-gray-300 hover:bg-gray-50 transition-colors">
        <span id="batchModeLabel">多选</span>
      </button>
      <span id="stats" class="ml-auto text-xs sm:text-sm text-gray-500"></span>
    </div>
  </div>

  <!-- Main -->
  <main class="max-w-7xl mx-auto px-3 sm:px-6 py-4 sm:py-6">
    <div id="galleryView" class="masonry"></div>
    <div id="messagesView" class="hidden masonry-msg"></div>
    <div id="gallerySentinel" class="hidden py-8 text-center text-sm text-gray-400">
      <span id="galleryLoadingText">加载中...</span>
    </div>
    <div id="pagination" class="flex justify-center gap-1.5 sm:gap-2 mt-6 sm:mt-8"></div>
    <div id="empty" class="hidden text-center py-16 sm:py-20 text-gray-400 text-sm">暂无数据</div>
  </main>

  <!-- Batch Action Bar -->
  <div id="batchBar" class="batch-bar fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-40 transform translate-y-full opacity-0">
    <div class="max-w-7xl mx-auto px-3 sm:px-6 py-2.5 sm:py-3 flex items-center gap-2 sm:gap-3">
      <span id="batchCount" class="text-xs sm:text-sm font-medium text-gray-700 shrink-0">已选 0</span>
      <input id="batchTagInput" placeholder="输入标签（空格分隔）..." class="flex-1 min-w-0 text-xs sm:text-sm border border-gray-300 rounded-lg px-2 sm:px-3 py-1 sm:py-1.5 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none">
      <button onclick="batchAddTags()" class="px-3 sm:px-4 py-1 sm:py-1.5 bg-brand-600 text-white text-xs sm:text-sm font-medium rounded-lg hover:bg-brand-700 transition-colors shrink-0">添加</button>
      <button onclick="batchRemoveTags()" class="px-3 sm:px-4 py-1 sm:py-1.5 bg-red-50 text-red-600 text-xs sm:text-sm font-medium rounded-lg hover:bg-red-100 transition-colors shrink-0">移除</button>
      <button onclick="exitBatchMode()" class="px-2 sm:px-3 py-1 sm:py-1.5 text-xs sm:text-sm text-gray-500 hover:text-gray-700 shrink-0">取消</button>
    </div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="hidden fixed inset-0 z-50 bg-black/90 lightbox-backdrop flex-col items-center justify-center p-4" onclick="if(event.target===this)closeLightbox()">
    <button onclick="closeLightbox()" class="absolute top-3 right-3 sm:top-4 sm:right-4 text-white/70 hover:text-white transition-colors z-10">
      <svg class="w-7 h-7 sm:w-8 sm:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <button onclick="navLightbox(event,-1)" class="absolute left-1 sm:left-4 top-1/2 -translate-y-1/2 text-white/50 hover:text-white transition-colors z-10">
      <svg class="w-8 h-8 sm:w-10 sm:h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </button>
    <button onclick="navLightbox(event,1)" class="absolute right-1 sm:right-4 top-1/2 -translate-y-1/2 text-white/50 hover:text-white transition-colors z-10">
      <svg class="w-8 h-8 sm:w-10 sm:h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    </button>
    <img id="lightboxImg" class="max-w-[90vw] sm:max-w-[85vw] max-h-[60vh] sm:max-h-[70vh] object-contain rounded-lg shadow-2xl" src="">
    <div id="lbTags" class="mt-3 sm:mt-4 flex items-center gap-1.5 sm:gap-2 flex-wrap justify-center max-w-[90vw] sm:max-w-[80vw]"></div>
    <div class="mt-2 sm:mt-3 flex gap-2">
      <input id="lbTagInput" placeholder="输入标签..." onkeydown="if(event.key==='Enter')addTagFromInput()" class="px-3 sm:px-4 py-1 sm:py-1.5 bg-white/10 text-white placeholder-white/40 rounded-full text-xs sm:text-sm outline-none focus:bg-white/20 w-36 sm:w-48 transition-colors">
      <button onclick="addTagFromInput()" class="px-3 sm:px-4 py-1 sm:py-1.5 bg-brand-600 text-white rounded-full text-xs sm:text-sm hover:bg-brand-700 transition-colors">添加</button>
    </div>
    <div class="mt-2 sm:mt-3">
      <button onclick="deleteCurrentImage()" class="px-3 sm:px-4 py-1 sm:py-1.5 bg-red-600/80 text-white rounded-full text-xs sm:text-sm hover:bg-red-600 transition-colors">删除图片</button>
    </div>
  </div>

<script>
  let currentView = 'gallery';
  let currentPage = 1;
  let imageList = [];
  let lightboxIndex = 0;
  let batchMode = false;
  let selectedPaths = new Set();
  let galleryLoading = false;
  let galleryHasMore = true;

  function tagClass(i) { return 'tag-dot-' + (i % 5); }

  function renderTags(tags) {
    if (!tags || !tags.length) return '';
    return tags.map((t, i) =>
      `<span class="inline-flex items-center px-1.5 sm:px-2 py-0.5 rounded-full text-[10px] sm:text-xs font-medium ${tagClass(i)}">${esc(t)}</span>`
    ).join('');
  }

  async function loadDates() {
    const res = await fetch('/api/dates');
    const dates = await res.json();
    const sel = document.getElementById('dateFilter');
    dates.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.date;
      opt.textContent = `${d.date} (${d.count})`;
      sel.appendChild(opt);
    });
  }

  async function loadTagOptions() {
    const res = await fetch('/api/tags');
    const tags = await res.json();
    const sel = document.getElementById('tagFilter');
    while (sel.options.length > 1) sel.remove(1);
    tags.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t.tag;
      opt.textContent = `${t.tag} (${t.count})`;
      sel.appendChild(opt);
    });
  }

  async function loadData() {
    const date = document.getElementById('dateFilter').value;
    const tag = document.getElementById('tagFilter').value;
    const type = document.getElementById('typeFilter').value;
    currentPage = 1;
    if (currentView === 'gallery') {
      galleryHasMore = true;
      await loadGallery(date, 1, tag, false);
    } else {
      await loadMessages(date, 1, tag, type);
    }
  }

  function renderGalleryCard(img, i) {
    return `
      <div class="group relative bg-white rounded-lg sm:rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-all duration-200 cursor-pointer fade-in ${selectedPaths.has(img.localPath) ? 'ring-2 ring-brand-500' : ''}"
           onclick="${batchMode ? `toggleSelect('${escJs(img.localPath)}')` : `openLightbox(${i})`}"
           data-path="${esc(img.localPath)}">
        ${batchMode ? `
          <div class="absolute top-1.5 left-1.5 sm:top-2 sm:left-2 z-10 w-5 h-5 sm:w-6 sm:h-6 rounded-md border-2 ${selectedPaths.has(img.localPath) ? 'bg-brand-600 border-brand-600' : 'bg-white/80 border-gray-300'} flex items-center justify-center">
            ${selectedPaths.has(img.localPath) ? '<svg class="w-3 h-3 sm:w-4 sm:h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>' : ''}
          </div>` : ''}
        <button class="absolute top-1.5 right-1.5 sm:top-2 sm:right-2 z-10 w-6 h-6 sm:w-7 sm:h-7 rounded-full bg-black/50 text-white opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center"
                onclick="event.stopPropagation();deleteImage(${i})" title="删除">
          <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
        <img src="${img.url}" alt="" loading="lazy" class="w-full">
        <div class="p-1.5 sm:p-2.5">
          <div class="text-[10px] sm:text-xs font-medium text-gray-900 truncate">${esc(img.nickname || String(img.user_id))}</div>
          ${img.groupName ? `<div class="text-[9px] sm:text-[10px] text-brand-600 bg-brand-50 inline-block px-1 py-0.5 rounded truncate">${esc(img.groupName)}</div>` : ''}
          <div class="text-[9px] sm:text-[11px] text-gray-400 mt-0.5">${new Date(img.time * 1000).toLocaleString()}</div>
          ${img.tags && img.tags.length ? `<div class="mt-1 flex gap-0.5 sm:gap-1 flex-wrap">${renderTags(img.tags)}</div>` : ''}
        </div>
      </div>
    `;
  }

  async function loadGallery(date, page, tag, append) {
    if (galleryLoading) return;
    galleryLoading = true;
    page = page || 1;
    const params = new URLSearchParams({ page: String(page), limit: '60' });
    if (date) params.set('date', date);
    if (tag) params.set('tag', tag);

    const container = document.getElementById('galleryView');
    const empty = document.getElementById('empty');
    const batchBtn = document.getElementById('btnBatchMode');

    try {
      const res = await fetch('/api/images?' + params.toString());
      const data = await res.json();

      if (append) {
        const startIdx = imageList.length;
        imageList = imageList.concat(data.items);
        const html = data.items.map((img, i) => renderGalleryCard(img, startIdx + i)).join('');
        container.insertAdjacentHTML('beforeend', html);
      } else {
        imageList = data.items;
        if (data.items.length === 0) {
          container.innerHTML = '';
          empty.classList.remove('hidden');
          batchBtn.classList.add('hidden');
        } else {
          empty.classList.add('hidden');
          batchBtn.classList.remove('hidden');
          container.innerHTML = data.items.map((img, i) => renderGalleryCard(img, i)).join('');
        }
      }

      galleryHasMore = data.items.length >= 60;
      document.getElementById('stats').textContent = imageList.length + ' / ' + data.total + ' 张图片';
      showGalleryLoading(galleryHasMore);
    } catch (err) {
      console.error('[loadGallery] Error:', err);
    }
    galleryLoading = false;
  }

  function loadMoreGallery() {
    if (!galleryHasMore || galleryLoading || currentView !== 'gallery') return;
    const date = document.getElementById('dateFilter').value;
    const tag = document.getElementById('tagFilter').value;
    currentPage++;
    loadGallery(date, currentPage, tag, true);
  }

  async function loadMessages(date, page, tag, type) {
    try {
      page = page || 1;
      const params = new URLSearchParams({ page: String(page), limit: '30' });
      if (date) params.set('date', date);
      if (tag) params.set('tag', tag);
      if (type) params.set('type', type);
      const res = await fetch('/api/messages?' + params.toString());
      const data = await res.json();

      const container = document.getElementById('messagesView');
      const empty = document.getElementById('empty');

      if (!data.items || data.items.length === 0) {
        container.innerHTML = '';
        empty.classList.remove('hidden');
      } else {
        empty.classList.add('hidden');
        let html = '';
        for (const msg of data.items) {
          const name = msg.nickname || String(msg.user_id || '');
          const time = new Date((msg.time || 0) * 1000).toLocaleString();
          const group = msg.groupName ? '<span class="px-1.5 py-0.5 bg-brand-50 text-brand-600 rounded text-[10px] sm:text-xs font-medium">' + esc(msg.groupName) + '</span>' : '';
          const filePaths = (msg.segments || []).filter(s => s.data && s.data.localPath).map(s => s.data.localPath);

          // Collect media segments
          const imgSegs = (msg.segments || []).filter(s => s.type === 'image' && s.data.localPath);
          const vidSegs = (msg.segments || []).filter(s => s.type === 'video' && s.data.localPath);
          const fileSegs = (msg.segments || []).filter(s => s.type === 'file' && s.data.localPath);
          const isSingleImage = imgSegs.length === 1 && vidSegs.length === 0 && fileSegs.length === 0;
          const isSingleVideo = vidSegs.length === 1 && imgSegs.length === 0 && fileSegs.length === 0;
          const isSingleFile = fileSegs.length === 1 && imgSegs.length === 0 && vidSegs.length === 0;

          let mediaHtml = '';

          if (isSingleImage) {
            // Single image: full-width display
            const s = imgSegs[0];
            const tags = s.data.tags || [];
            const tagHtml = tags.length ? '<div class="flex gap-1 mt-1.5 flex-wrap">' + tags.map(t => '<span class="px-1.5 py-0.5 bg-brand-50 text-brand-600 rounded text-xs">' + esc(t) + '</span>').join('') + '</div>' : '';
            mediaHtml = '<div class="mt-2">'
              + '<img src="/downloads/' + s.data.localPath + '" onclick="openLightboxUrl(\'/downloads/' + s.data.localPath + '\')" loading="lazy" class="w-full max-h-[400px] object-contain rounded-lg cursor-pointer hover:opacity-90 transition-opacity">'
              + tagHtml
              + '</div>';
          } else if (isSingleVideo) {
            // Single video: full-width player
            const s = vidSegs[0];
            mediaHtml = '<div class="mt-2">'
              + '<video src="/downloads/' + s.data.localPath + '" controls preload="metadata" class="w-full max-h-[400px] rounded-lg"></video>'
              + '</div>';
          } else if (isSingleFile) {
            // Single file: nice file card
            const s = fileSegs[0];
            const fname = esc(s.data.file || '文件');
            const fsize = s.data.size ? formatFileSize(s.data.size) : '';
            mediaHtml = '<div class="mt-2">'
              + '<a href="/downloads/' + s.data.localPath + '" target="_blank" class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition-colors group">'
              + '<div class="w-10 h-10 rounded-lg bg-brand-50 flex items-center justify-center flex-shrink-0">'
              + '<svg class="w-5 h-5 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>'
              + '</div>'
              + '<div class="flex-1 min-w-0">'
              + '<div class="text-sm font-medium text-gray-900 truncate">' + fname + '</div>'
              + (fsize ? '<div class="text-xs text-gray-400">' + fsize + '</div>' : '')
              + '</div>'
              + '<svg class="w-5 h-5 text-gray-400 group-hover:text-brand-600 transition-colors flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>'
              + '</a>'
              + '</div>';
          } else if (imgSegs.length || vidSegs.length) {
            // Multiple media: thumbnail grid
            mediaHtml = '<div class="flex gap-1.5 sm:gap-2 flex-wrap mt-2">';
            for (const s of imgSegs) {
              const tags = s.data.tags || [];
              const tagHtml = tags.length ? '<div class="flex gap-0.5 mt-0.5">' + tags.map(t => '<span class="px-1 py-0.5 bg-brand-50 text-brand-600 rounded text-[9px]">' + esc(t) + '</span>').join('') + '</div>' : '';
              mediaHtml += '<div><img src="/downloads/' + s.data.localPath + '" onclick="openLightboxUrl(\'/downloads/' + s.data.localPath + '\')" loading="lazy" class="w-24 h-24 sm:w-28 sm:h-28 object-cover rounded-lg cursor-pointer hover:opacity-80 transition-opacity">' + tagHtml + '</div>';
            }
            for (const s of vidSegs) {
              mediaHtml += '<video src="/downloads/' + s.data.localPath + '" controls preload="metadata" class="w-32 sm:w-40 rounded-lg"></video>';
            }
            mediaHtml += '</div>';
          }

          // Body text (non-file text segments)
          let bodyHtml = '';
          for (const seg of (msg.segments || [])) {
            if (seg.type === 'text') bodyHtml += '<p class="text-xs sm:text-sm text-gray-700">' + esc(seg.data.text || '') + '</p>';
            else if (seg.type === 'file' && !seg.data.localPath) bodyHtml += '<p class="text-xs text-gray-400">[文件]</p>';
            else if (seg.type === 'forward') bodyHtml += '<p class="text-xs text-amber-700">转发消息</p>';
            else if (seg.type === 'at') bodyHtml += '<span class="text-xs text-brand-600">@' + esc(seg.data.name || seg.data.qq || '') + '</span>';
          }

          // For multi-file messages without single-file card, show file links in body
          if (!isSingleFile) {
            for (const seg of fileSegs) {
              const fname = esc(seg.data.file || '文件');
              const fsize = seg.data.size ? ' (' + formatFileSize(seg.data.size) + ')' : '';
              bodyHtml += '<a href="/downloads/' + seg.data.localPath + '" target="_blank" class="inline-flex items-center gap-1.5 text-xs text-brand-600 hover:text-brand-700">'
                + '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>'
                + fname + fsize + '</a>';
            }
          }

          const delBtn = filePaths.length ? '<button onclick="deleteMsgFiles(this)" data-paths=\'' + esc(JSON.stringify(filePaths)) + '\' class="text-[10px] sm:text-xs text-red-500 hover:text-red-700 hover:bg-red-50 px-1.5 sm:px-2 py-0.5 rounded transition-colors shrink-0">删除</button>' : '';

          html += '<div class="bg-white rounded-lg sm:rounded-xl shadow-sm p-3 sm:p-4 fade-in">'
            + '<div class="flex items-center gap-2 sm:gap-3 mb-1.5 sm:mb-2">'
            + '<span class="text-xs sm:text-sm font-medium text-gray-900 truncate">' + esc(name) + '</span>'
            + group
            + '<span class="text-[10px] sm:text-xs text-gray-400 ml-auto shrink-0">' + esc(time) + '</span>'
            + delBtn
            + '</div>'
            + mediaHtml
            + (bodyHtml ? '<div class="mt-1">' + bodyHtml + '</div>' : '')
            + '</div>';
        }
        container.innerHTML = html;
      }

      document.getElementById('stats').textContent = (data.total || 0) + ' 条消息';
      renderPagination(data.total || 0, data.limit || 30, page, function(p) { loadMessages(date, p, tag, type); });
    } catch (err) {
      console.error('[loadMessages] Error:', err);
      document.getElementById('stats').textContent = '加载失败';
    }
  }

  function renderPagination(total, limit, current, callback) {
    const pages = Math.ceil(total / limit);
    const container = document.getElementById('pagination');
    if (pages <= 1) { container.innerHTML = ''; return; }

    const btn = (text, disabled, active) =>
      `<button ${disabled ? 'disabled' : ''} class="px-2 sm:px-3 py-1 sm:py-1.5 text-xs sm:text-sm rounded-lg border ${disabled ? 'border-gray-200 text-gray-300' : active ? 'bg-brand-600 text-white border-brand-600' : 'border-gray-300 text-gray-600 hover:bg-gray-50'} transition-colors">${text}</button>`;

    let html = btn('上一页', current <= 1, false);
    for (let i = 1; i <= Math.min(pages, 10); i++) {
      html += btn(String(i), false, i === current);
    }
    html += btn('下一页', current >= pages, false);
    container.innerHTML = html;

    container.querySelectorAll('button').forEach(b => {
      b.addEventListener('click', () => {
        const t = b.textContent;
        if (t === '上一页') callback(current - 1);
        else if (t === '下一页') callback(current + 1);
        else { const p = parseInt(t); if (!isNaN(p)) callback(p); }
      });
    });
  }

  function switchView(view) {
    currentView = view;
    localStorage.setItem('qv-view', view);
    exitBatchMode();
    document.getElementById('navGallery').className = `px-2.5 sm:px-4 py-1 sm:py-1.5 rounded-md font-medium transition-colors text-xs sm:text-sm ${view === 'gallery' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`;
    document.getElementById('navMessages').className = `px-2.5 sm:px-4 py-1 sm:py-1.5 rounded-md font-medium transition-colors text-xs sm:text-sm ${view === 'messages' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`;
    document.getElementById('galleryView').classList.toggle('hidden', view !== 'gallery');
    document.getElementById('messagesView').classList.toggle('hidden', view !== 'messages');
    document.getElementById('typeFilter').classList.toggle('hidden', view !== 'messages');
    document.getElementById('pagination').classList.toggle('hidden', view !== 'messages');
    if (view !== 'gallery') showGalleryLoading(false);
    loadData();
  }

  // ── Lightbox ───────────────────────────────────────────

  function openLightbox(index) {
    lightboxIndex = index;
    updateLightbox();
    document.getElementById('lightbox').classList.remove('hidden');
    document.getElementById('lightbox').classList.add('flex');
    document.body.style.overflow = 'hidden';
  }

  function openLightboxUrl(url) {
    const idx = imageList.findIndex(img => img.url === url || `/downloads/${img.localPath}` === url);
    if (idx >= 0) {
      lightboxIndex = idx;
      updateLightbox();
    } else {
      // Image not in gallery list — show directly
      document.getElementById('lightboxImg').src = url;
      document.getElementById('lbTags').innerHTML = '<span class="text-white/40 text-xs sm:text-sm">暂无标签</span>';
    }
    document.getElementById('lightbox').classList.remove('hidden');
    document.getElementById('lightbox').classList.add('flex');
    document.body.style.overflow = 'hidden';
  }

  function updateLightbox() {
    const img = imageList[lightboxIndex];
    if (!img) return;
    document.getElementById('lightboxImg').src = img.url;
    renderLightboxTags(img);
  }

  function renderLightboxTags(img) {
    const container = document.getElementById('lbTags');
    const tags = img.tags || [];
    container.innerHTML = tags.length
      ? tags.map((t, i) =>
          `<span class="inline-flex items-center px-2.5 sm:px-3 py-0.5 sm:py-1 rounded-full text-xs sm:text-sm font-medium ${tagClass(i)}">${esc(t)}<span class="ml-1 sm:ml-1.5 cursor-pointer opacity-60 hover:opacity-100" onclick="removeTag('${escJs(img.localPath)}','${escJs(t)}')">&times;</span></span>`
        ).join('')
      : '<span class="text-white/40 text-xs sm:text-sm">暂无标签</span>';
  }

  async function addTagFromInput() {
    const input = document.getElementById('lbTagInput');
    const tagsRaw = input.value.trim();
    if (!tagsRaw) return;
    const img = imageList[lightboxIndex];
    if (!img) return;

    const newTags = tagsRaw.split(/\s+/).filter(t => t);
    const tags = [...(img.tags || [])];
    for (const t of newTags) { if (!tags.includes(t)) tags.push(t); }
    await saveTags(img.localPath, tags);
    img.tags = tags;
    renderLightboxTags(img);
    input.value = '';
    loadTagOptions();
  }

  async function removeTag(localPath, tag) {
    const img = imageList[lightboxIndex];
    if (!img) return;
    const tags = (img.tags || []).filter(t => t !== tag);
    await saveTags(localPath, tags);
    img.tags = tags;
    renderLightboxTags(img);
    loadTagOptions();
  }

  async function saveTags(localPath, tags) {
    await fetch('/api/tags', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ localPath, tags }),
    });
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.add('hidden');
    document.getElementById('lightbox').classList.remove('flex');
    document.body.style.overflow = '';
  }

  function navLightbox(e, dir) {
    e.stopPropagation();
    if (!imageList.length) return;
    lightboxIndex = (lightboxIndex + dir + imageList.length) % imageList.length;
    updateLightbox();
  }

  document.addEventListener('keydown', (e) => {
    const lb = document.getElementById('lightbox');
    if (lb.classList.contains('hidden')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') navLightbox(e, -1);
    if (e.key === 'ArrowRight') navLightbox(e, 1);
  });

  // ── Batch Mode ─────────────────────────────────────────

  function toggleBatchMode() { batchMode ? exitBatchMode() : enterBatchMode(); }

  function enterBatchMode() {
    batchMode = true;
    selectedPaths.clear();
    document.getElementById('batchModeLabel').textContent = '退出多选';
    document.getElementById('btnBatchMode').classList.add('bg-brand-50', 'text-brand-700', 'border-brand-300');
    updateBatchBar();
    loadGallery(document.getElementById('dateFilter').value, currentPage, document.getElementById('tagFilter').value);
  }

  function exitBatchMode() {
    batchMode = false;
    selectedPaths.clear();
    document.getElementById('batchModeLabel').textContent = '多选';
    document.getElementById('btnBatchMode').classList.remove('bg-brand-50', 'text-brand-700', 'border-brand-300');
    document.getElementById('batchBar').classList.add('translate-y-full', 'opacity-0');
    if (currentView === 'gallery') loadGallery(document.getElementById('dateFilter').value, currentPage, document.getElementById('tagFilter').value);
  }

  function toggleSelect(localPath) {
    selectedPaths.has(localPath) ? selectedPaths.delete(localPath) : selectedPaths.add(localPath);
    updateBatchBar();
    const card = document.querySelector(`[data-path="${CSS.escape(localPath)}"]`);
    if (card) {
      card.classList.toggle('ring-2', selectedPaths.has(localPath));
      card.classList.toggle('ring-brand-500', selectedPaths.has(localPath));
      const check = card.querySelector('div[class*="absolute"][class*="top"]');
      if (check && check.querySelector('svg')) {
        check.className = `absolute top-1.5 left-1.5 sm:top-2 sm:left-2 z-10 w-5 h-5 sm:w-6 sm:h-6 rounded-md border-2 flex items-center justify-center ${selectedPaths.has(localPath) ? 'bg-brand-600 border-brand-600' : 'bg-white/80 border-gray-300'}`;
        check.innerHTML = selectedPaths.has(localPath)
          ? '<svg class="w-3 h-3 sm:w-4 sm:h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>'
          : '';
      }
    }
  }

  function updateBatchBar() {
    const bar = document.getElementById('batchBar');
    document.getElementById('batchCount').textContent = `已选 ${selectedPaths.size}`;
    selectedPaths.size > 0 ? bar.classList.remove('translate-y-full', 'opacity-0') : bar.classList.add('translate-y-full', 'opacity-0');
  }

  async function batchAddTags() {
    const input = document.getElementById('batchTagInput');
    const tagsRaw = input.value.trim();
    if (!tagsRaw || selectedPaths.size === 0) return;
    const tags = tagsRaw.split(/\s+/).filter(t => t);
    const res = await fetch('/api/tags/batch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ localPaths: [...selectedPaths], tags, mode: 'add' }),
    });
    const data = await res.json();
    if (data.ok) { input.value = ''; exitBatchMode(); loadTagOptions(); loadData(); }
  }

  async function batchRemoveTags() {
    const input = document.getElementById('batchTagInput');
    const tagsRaw = input.value.trim();
    if (!tagsRaw || selectedPaths.size === 0) return;
    const tags = tagsRaw.split(/\s+/).filter(t => t);
    const res = await fetch('/api/tags/batch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ localPaths: [...selectedPaths], tags, mode: 'remove' }),
    });
    const data = await res.json();
    if (data.ok) { input.value = ''; exitBatchMode(); loadTagOptions(); loadData(); }
  }

  // ── Utilities ──────────────────────────────────────────

  function applyAutoCollapse() {
    document.querySelectorAll('.msg-body-auto').forEach(el => {
      if (el.scrollHeight > 140) {
        el.classList.add('msg-body-collapse');
        el.nextElementSibling.classList.remove('hidden');
        el.nextElementSibling.textContent = '展开';
      }
      el.classList.remove('msg-body-auto');
    });
  }

  function toggleCollapse(btn) {
    const body = btn.previousElementSibling;
    const collapsed = body.classList.toggle('msg-body-collapse');
    btn.textContent = collapsed ? '展开' : '收起';
  }

  function esc(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }
  function escJs(text) { return String(text).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }
  function formatFileSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
    return (bytes / 1073741824).toFixed(1) + ' GB';
  }

  async function deleteImage(index) {
    const img = imageList[index];
    if (!img) return;
    if (!await showConfirm(`确认删除此图片？\n${img.file || img.localPath}`)) return;
    const res = await fetch(`/api/files/${img.localPath}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.ok) { imageList.splice(index, 1); loadData(); }
  }

  async function deleteCurrentImage() { await deleteImage(lightboxIndex); closeLightbox(); }

  async function deleteMsgFiles(btn) {
    const paths = JSON.parse(btn.dataset.paths);
    if (!await showConfirm(`确认删除 ${paths.length} 个文件？`)) return;
    for (const p of paths) await fetch(`/api/files/${p}`, { method: 'DELETE' });
    loadData();
  }

  Promise.all([loadDates(), loadTagOptions()]).then(() => {
    const urlView = new URLSearchParams(location.search).get('view');
    const saved = localStorage.getItem('qv-view');
    const view = urlView || saved || 'gallery';
    if (view === 'messages') switchView('messages');
    else loadData();
  });

  // Infinite scroll for gallery
  const sentinel = document.getElementById('gallerySentinel');
  const scrollObserver = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting && currentView === 'gallery') {
      loadMoreGallery();
    }
  }, { rootMargin: '400px' });
  scrollObserver.observe(sentinel);

  function showGalleryLoading(show) {
    sentinel.classList.toggle('hidden', !show);
    document.getElementById('galleryLoadingText').textContent = show
      ? (galleryLoading ? '加载中...' : '滚动加载更多') : '';
  }

  // CSS 确认弹窗
  function showConfirm(message) {
    return new Promise(resolve => {
      const overlay = document.getElementById('confirmOverlay');
      document.getElementById('confirmMsg').textContent = message;
      overlay.classList.remove('hidden');
      overlay.classList.add('flex');
      const okBtn = document.getElementById('confirmOk');
      const cancelBtn = document.getElementById('confirmCancel');
      function cleanup(result) {
        overlay.classList.add('hidden');
        overlay.classList.remove('flex');
        okBtn.removeEventListener('click', onOk);
        cancelBtn.removeEventListener('click', onCancel);
        overlay.removeEventListener('click', onBg);
        resolve(result);
      }
      function onOk() { cleanup(true); }
      function onCancel() { cleanup(false); }
      function onBg(e) { if (e.target === overlay) cleanup(false); }
      okBtn.addEventListener('click', onOk);
      cancelBtn.addEventListener('click', onCancel);
      overlay.addEventListener('click', onBg);
    });
  }
</script>

<!-- 确认弹窗 -->
<div id="confirmOverlay" class="hidden fixed inset-0 z-[100] bg-black/40 items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl max-w-sm w-full p-6 animate-[fadeIn_0.15s_ease]">
    <p id="confirmMsg" class="text-sm text-gray-700 whitespace-pre-line mb-6"></p>
    <div class="flex justify-end gap-3">
      <button id="confirmCancel" class="px-4 py-2 text-sm text-gray-500 hover:text-gray-700 rounded-lg hover:bg-gray-100 transition-colors">取消</button>
      <button id="confirmOk" class="px-4 py-2 text-sm text-white bg-red-500 hover:bg-red-600 rounded-lg transition-colors">确认删除</button>
    </div>
  </div>
</div>
</body>
</html>
