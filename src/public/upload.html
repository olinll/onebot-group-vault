<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上传 - 群宝箱</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script src="/lib/tailwind.js"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: { 50:'#eff6ff',100:'#dbeafe',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8' } } } }
    }
  </script>
  <style>
    .fade-in { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .upload-done { position: relative; }
    .upload-done::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.6);
      border-radius: 0.75rem;
      pointer-events: none;
    }
    .upload-done .done-check {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      width: 2.5rem;
      height: 2.5rem;
      background: #2563eb;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-3 sm:px-6 h-12 sm:h-14 flex items-center justify-between">
      <a href="/" class="flex items-center gap-1.5 sm:gap-2 shrink-0 hover:opacity-80 transition-opacity">
        <img src="/favicon.svg" class="w-6 h-6 sm:w-7 sm:h-7" alt="">
        <h1 class="hidden sm:block text-base sm:text-lg font-semibold text-gray-900">群宝箱</h1>
      </a>
      <nav class="flex gap-0.5 sm:gap-1 bg-gray-100 rounded-lg p-0.5 sm:p-1 text-xs sm:text-sm">
        <a href="/" class="px-2.5 sm:px-4 py-1 sm:py-1.5 rounded-md font-medium text-gray-500 hover:text-gray-700 transition-colors">画廊</a>
        <a href="/?view=messages" class="px-2.5 sm:px-4 py-1 sm:py-1.5 rounded-md font-medium text-gray-500 hover:text-gray-700 transition-colors">消息</a>
        <a href="/upload" class="px-2.5 sm:px-4 py-1 sm:py-1.5 rounded-md font-medium bg-white text-gray-900 shadow-sm">上传</a>
        <a id="navAdmin" href="/admin" class="hidden px-2.5 sm:px-4 py-1 sm:py-1.5 rounded-md font-medium text-gray-500 hover:text-gray-700 transition-colors">管理</a>
      </nav>
      <div class="flex items-center gap-2 sm:gap-3 shrink-0">
        <a href="https://github.com/olinll/onebot-group-vault.git" target="_blank" class="text-gray-400 hover:text-gray-700 transition-colors" title="GitHub">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        </a>
        <span id="currentUser" class="text-xs text-gray-400"></span>
        <button onclick="logout()" class="text-xs text-gray-400 hover:text-red-500 transition-colors">退出</button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-3 sm:px-6 py-4 sm:py-8">

    <!-- Drop Zone: full width -->
    <div id="dropZone" class="border-2 border-dashed border-gray-300 rounded-2xl p-6 sm:p-10 text-center hover:border-brand-500 hover:bg-brand-50/30 transition-colors cursor-pointer">
      <svg class="mx-auto h-10 w-10 sm:h-12 sm:w-12 text-gray-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
      </svg>
      <p class="text-sm sm:text-base text-gray-600 mb-1">拖拽文件到此处，或 <span class="text-brand-600 font-medium">点击选择</span></p>
      <p class="text-xs sm:text-sm text-gray-400">支持图片、视频、文件（单个最大 100MB，最多 20 个）</p>
      <input type="file" id="fileInput" multiple class="hidden">
    </div>

    <!-- Actions bar -->
    <div id="uploadActions" class="hidden mt-4 bg-white rounded-xl shadow-sm p-3 sm:p-4">
      <div class="flex flex-col sm:flex-row items-start sm:items-center gap-3">
        <div class="flex-1 min-w-0 w-full sm:w-auto">
          <label class="block text-xs font-medium text-gray-500 mb-1">全局标签 <span class="font-normal">（空格分隔）</span></label>
          <input id="globalTags" placeholder="例如：猫 表情包 风景" class="w-full text-sm border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none">
        </div>
        <div class="flex items-center gap-2 sm:mt-5">
          <button id="uploadBtn" onclick="startUpload()" class="px-5 py-2 bg-brand-600 text-white text-sm font-medium rounded-lg hover:bg-brand-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
            全部上传
          </button>
          <button onclick="clearAll()" class="px-3 py-2 text-sm text-gray-500 hover:text-gray-700 transition-colors">清空</button>
          <span id="uploadStatus" class="text-xs sm:text-sm text-gray-500"></span>
        </div>
      </div>
      <!-- Progress -->
      <div id="progressWrap" class="hidden mt-3">
        <div class="flex items-center justify-between mb-1">
          <span class="text-xs font-medium text-gray-700">上传中...</span>
          <span id="progressPct" class="text-xs text-gray-500">0%</span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-2">
          <div id="progressBar" class="bg-brand-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>
      </div>
    </div>

    <!-- Two columns: pending (left) + completed (right) -->
    <div id="columnsWrap" class="hidden mt-4 flex flex-col lg:flex-row gap-4 sm:gap-6">
      <!-- Left: Pending files -->
      <div class="flex-1 min-w-0">
        <h3 class="text-sm font-semibold text-gray-700 mb-2">待上传</h3>
        <div id="fileList" class="space-y-2 sm:space-y-3"></div>
      </div>
      <!-- Right: Results -->
      <div id="results" class="hidden lg:w-2/5 shrink-0">
        <h3 class="text-sm font-semibold text-gray-700 mb-2">上传完成</h3>
        <div id="resultsList" class="space-y-2 bg-white rounded-xl shadow-sm p-3 sm:p-4 max-h-[60vh] overflow-y-auto"></div>
      </div>
    </div>

    <div id="emptyHint" class="text-center py-16 text-gray-400 text-sm">拖拽或点击上方区域添加文件</div>

  </main>

<script>
  function getToken() { return localStorage.getItem('qv-token'); }
  function authHeaders() { return { 'Authorization': 'Bearer ' + getToken() }; }
  function logout() {
    localStorage.removeItem('qv-token');
    localStorage.removeItem('qv-user');
    window.location.href = '/login.html';
  }

  (async function init() {
    try {
      const res = await fetch('/api/auth/me', { headers: authHeaders() });
      if (!res.ok) { window.location.href = '/login.html'; return; }
      const user = await res.json();
      document.getElementById('navAdmin').classList.toggle('hidden', user.role !== 'admin');
      document.getElementById('currentUser').textContent = user.username;
    } catch {
      window.location.href = '/login.html';
    }
  })();

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileList = document.getElementById('fileList');
  const emptyHint = document.getElementById('emptyHint');
  let selectedFiles = [];
  let uploadedIndices = new Set();

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('border-brand-500', 'bg-brand-50/30'); });
  dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('border-brand-500', 'bg-brand-50/30'); });
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('border-brand-500', 'bg-brand-50/30');
    addFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', () => addFiles(fileInput.files));

  function addFiles(fileObjs) {
    for (const f of fileObjs) {
      if (selectedFiles.some(sf => sf.name === f.name && sf.size === f.size)) continue;
      selectedFiles.push(f);
    }
    renderFileList();
  }

  function removeFile(index) {
    selectedFiles.splice(index, 1);
    uploadedIndices.clear();
    renderFileList();
  }

  function renderFileList() {
    const actions = document.getElementById('uploadActions');
    const cols = document.getElementById('columnsWrap');
    if (selectedFiles.length === 0) {
      fileList.innerHTML = '';
      actions.classList.add('hidden');
      cols.classList.add('hidden');
      emptyHint.classList.remove('hidden');
      uploadedIndices.clear();
      return;
    }

    emptyHint.classList.add('hidden');
    actions.classList.remove('hidden');
    cols.classList.remove('hidden');
    fileList.innerHTML = selectedFiles.map((f, i) => {
      const isImg = /\.(jpg|jpeg|png|gif|webp|bmp|svg)$/i.test(f.name);
      const isVid = /\.(mp4|webm|mov|avi)$/i.test(f.name);
      const size = f.size < 1024 ? `${f.size} B` : f.size < 1048576 ? `${(f.size/1024).toFixed(1)} KB` : `${(f.size/1048576).toFixed(1)} MB`;
      const icon = isVid
        ? '<svg class="w-6 h-6 sm:w-8 sm:h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
        : '<svg class="w-6 h-6 sm:w-8 sm:h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>';
      const done = uploadedIndices.has(i);
      return `
        <div class="bg-white rounded-xl shadow-sm p-3 sm:p-4 flex items-center gap-3 sm:gap-4 fade-in ${done ? 'upload-done' : ''}">
          ${isImg ? `<img src="${URL.createObjectURL(f)}" class="w-12 h-12 sm:w-16 sm:h-16 object-cover rounded-lg flex-shrink-0">` :
            `<div class="w-12 h-12 sm:w-16 sm:h-16 bg-gray-100 rounded-lg flex items-center justify-center flex-shrink-0">${icon}</div>`}
          ${done ? '<div class="done-check"><svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg></div>' : ''}
          <div class="flex-1 min-w-0">
            <div class="text-xs sm:text-sm font-medium text-gray-900 truncate">${esc(f.name)}</div>
            <div class="text-xs text-gray-400">${size}</div>
            <input data-index="${i}" placeholder="标签（可选，空格分隔）"
              ${done ? 'disabled' : ''}
              class="mt-1 sm:mt-1.5 w-full text-xs border border-gray-200 rounded-lg px-2 sm:px-2.5 py-1 sm:py-1.5 outline-none file-tags ${done ? 'bg-gray-50 text-gray-400 cursor-not-allowed' : 'focus:ring-1 focus:ring-brand-500 focus:border-brand-500'}">
          </div>
          ${done ? '' : `<button onclick="removeFile(${i})" class="text-gray-400 hover:text-red-500 transition-colors flex-shrink-0 p-1">
            <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>`}
        </div>
      `;
    }).join('');
  }

  function clearAll() {
    selectedFiles = [];
    uploadedIndices.clear();
    fileInput.value = '';
    renderFileList();
    document.getElementById('results').classList.add('hidden');
    document.getElementById('progressWrap').classList.add('hidden');
    document.getElementById('uploadStatus').textContent = '';
  }

  async function startUpload() {
    if (selectedFiles.length === 0) return;

    const btn = document.getElementById('uploadBtn');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar = document.getElementById('progressBar');
    const progressPct = document.getElementById('progressPct');
    const status = document.getElementById('uploadStatus');

    btn.disabled = true;
    progressWrap.classList.remove('hidden');
    status.textContent = '';

    const formData = new FormData();
    const globalTags = document.getElementById('globalTags').value.trim();
    if (globalTags) formData.append('tags', globalTags);

    const fileTags = {};
    document.querySelectorAll('.file-tags').forEach(input => {
      const idx = parseInt(input.dataset.index);
      const tags = input.value.trim();
      if (tags) fileTags[selectedFiles[idx].name] = tags.split(/\s+/);
    });
    if (Object.keys(fileTags).length > 0) {
      formData.append('fileTags', JSON.stringify(fileTags));
    }

    for (const f of selectedFiles) {
      formData.append('files', f);
    }

    try {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/upload');
      xhr.setRequestHeader('Authorization', 'Bearer ' + getToken());

      xhr.upload.addEventListener('progress', (e) => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          progressBar.style.width = pct + '%';
          progressPct.textContent = pct + '%';
        }
      });

      xhr.onload = () => {
        if (xhr.status === 401) {
          localStorage.removeItem('qv-token');
          localStorage.removeItem('qv-user');
          window.location.href = '/login.html';
          return;
        }
        if (xhr.status === 200) {
          const data = JSON.parse(xhr.responseText);
          showResults(data);
          status.textContent = `已上传 ${data.count} 个文件`;
        } else {
          status.textContent = '上传失败';
          status.classList.add('text-red-500');
        }
        btn.disabled = false;
      };

      xhr.onerror = () => {
        status.textContent = '上传出错';
        status.classList.add('text-red-500');
        btn.disabled = false;
      };

      xhr.send(formData);
    } catch (err) {
      status.textContent = '上传出错';
      btn.disabled = false;
    }
  }

  function showResults(data) {
    const results = document.getElementById('results');
    const list = document.getElementById('resultsList');
    results.classList.remove('hidden');

    // Mark all files as uploaded
    for (let i = 0; i < selectedFiles.length; i++) uploadedIndices.add(i);
    renderFileList();

    list.innerHTML = data.files.map(f => {
      const isImg = /\.(jpg|jpeg|png|gif|webp|bmp|svg)$/i.test(f.filename);
      return `
        <div class="flex items-center gap-3 py-2 fade-in">
          ${isImg ? `<img src="/downloads/${f.localPath}" class="w-10 h-10 object-cover rounded-lg flex-shrink-0">` :
            `<div class="w-10 h-10 bg-gray-100 rounded-lg flex items-center justify-center flex-shrink-0">
              <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            </div>`}
          <div class="flex-1 min-w-0">
            <div class="text-sm font-medium text-gray-900 truncate">${esc(f.filename)}</div>
            ${f.tags.length ? `<div class="flex gap-1 mt-0.5 flex-wrap">${f.tags.map(t => `<span class="px-1.5 py-0.5 bg-brand-50 text-brand-700 rounded text-xs">${esc(t)}</span>`).join('')}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');

    // Update drop zone hint
    dropZone.innerHTML = `
      <svg class="mx-auto h-8 w-8 text-green-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
      <p class="text-sm text-gray-600 mb-1">上传完成！可继续添加文件</p>
      <p class="text-xs text-gray-400">拖拽或点击选择更多文件</p>
      <input type="file" id="fileInput" multiple class="hidden">
    `;
    const newInput = dropZone.querySelector('#fileInput');
    newInput.addEventListener('change', () => addFiles(newInput.files));
  }

  function esc(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
</script>
</body>
</html>
