<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 群宝箱</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script src="/lib/tailwind.js"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: { 50:'#eff6ff',100:'#dbeafe',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8' } } } }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

  <header class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-3 sm:px-6 h-12 sm:h-14 flex items-center justify-between">
      <a href="/" class="flex items-center gap-1.5 sm:gap-2 shrink-0 hover:opacity-80 transition-opacity">
        <img src="/favicon.svg" class="w-6 h-6 sm:w-7 sm:h-7" alt="">
        <h1 class="hidden sm:block text-base sm:text-lg font-semibold text-gray-900">群宝箱</h1>
      </a>
      <a href="https://github.com/olinll/onebot-group-vault.git" target="_blank" class="text-gray-400 hover:text-gray-700 transition-colors" title="GitHub">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
      </a>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
      <div class="bg-white rounded-2xl shadow-sm p-6 sm:p-8">
        <h2 class="text-lg font-semibold text-gray-900 text-center mb-6">登录</h2>
        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
            <input id="username" type="text" required autocomplete="username"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
          </div>
          <div class="mb-5">
            <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
            <input id="password" type="password" required autocomplete="current-password"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
          </div>
          <div id="error" class="hidden mb-4 text-sm text-red-600 bg-red-50 rounded-lg px-3 py-2"></div>
          <button type="submit" id="submitBtn"
            class="w-full bg-brand-600 text-white text-sm font-medium rounded-lg px-4 py-2.5 hover:bg-brand-700 transition-colors disabled:opacity-50">
            登录
          </button>
        </form>
      </div>
    </div>
  </main>

<script>
  (async function() {
    const token = localStorage.getItem('qv-token');
    if (!token) return;
    try {
      const res = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
      if (res.ok) { window.location.href = '/'; return; }
    } catch {}
    localStorage.removeItem('qv-token');
    localStorage.removeItem('qv-user');
  })();

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const errEl = document.getElementById('error');
    btn.disabled = true;
    errEl.classList.add('hidden');

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (!res.ok) {
        errEl.textContent = data.error || '登录失败';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        return;
      }
      localStorage.setItem('qv-token', data.token);
      localStorage.setItem('qv-user', JSON.stringify(data.user));
      window.location.href = '/';
    } catch (err) {
      errEl.textContent = '网络错误';
      errEl.classList.remove('hidden');
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
